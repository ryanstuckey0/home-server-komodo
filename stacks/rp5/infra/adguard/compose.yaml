services:
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped

    volumes:
      - adguard_work:/opt/adguardhome/work
      - adguard_conf:/opt/adguardhome/conf

    ports:
      # DNS (TCP + UDP)
      - "53:53/tcp"
      - "53:53/udp"
      # DNS-over-TLS
      - "853:853/tcp"
      # DNS-over-QUIC
      - "784:784/udp"
      - "853:853/udp"
      # AdGuard setup wizard (only needed on first run; can be removed after)
      - "3000:3000/tcp"
      - "80:80/tcp" # Only needed for initial setup, can be removed after

    networks:
      - traefik_default

    labels:
      traefik.http.routers.adguard.rule: "Host(`ag.beansrn.com`)"
      traefik.http.routers.adguard.entrypoints: "websecure"
      traefik.http.services.adguard.loadbalancer.server.port: "80"

volumes:
  adguard_work:
  adguard_conf:

networks:
  traefik_default:
    external: true