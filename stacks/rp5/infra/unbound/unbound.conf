server:
    # -------------------------------------------------------------------------
    # General settings
    # -------------------------------------------------------------------------
    verbosity: 1
    port: 53

    # Listen on all interfaces (adjust if you want to restrict this)
    interface: 0.0.0.0

    # Allow queries from LAN and Tailscale subnets
    access-control: 127.0.0.0/8 allow
    access-control: 192.168.1.0/24 allow
    access-control: 100.64.0.0/10 allow     # Tailscale CGNAT range

    # -------------------------------------------------------------------------
    # Performance / hardening
    # -------------------------------------------------------------------------
    num-threads: 2
    so-reuseport: yes
    cache-min-ttl: 300
    cache-max-ttl: 86400
    hide-identity: yes
    hide-version: yes

    # -------------------------------------------------------------------------
    # Views
    # -------------------------------------------------------------------------

    # --- LAN view: return local 192.168.1.x IPs ---
    view:
        name: "lan"
        view-first: yes     # Fall through to global config if no local match

        # Raspberry Pi records
        local-data: "km.beansrn.com.       A 192.168.1.2"
        local-data: "ag.beansrn.com.       A 192.168.1.2"
        local-data: "vw.beansrn.com.       A 192.168.1.2"
        local-data: "ha.beansrn.com.       A 192.168.1.2"

        # Wildcard: *.rp5.beansrn.com -> Raspberry Pi
        local-zone: "rp5.beansrn.com." redirect
        local-data: "rp5.beansrn.com.      A 192.168.1.2"

        # NAS records
        local-data: "jf.beansrn.com.       A 192.168.1.3"
        local-data: "nc.beansrn.com.       A 192.168.1.3"

        # Wildcard: *.nas.beansrn.com -> NAS
        local-zone: "nas.beansrn.com." redirect
        local-data: "nas.beansrn.com.      A 192.168.1.3"

    # --- Tailscale view: return Tailscale 100.x.x.x IPs ---
    view:
        name: "tailscale"
        view-first: yes     # Fall through to global config if no local match

        # Raspberry Pi records
        local-data: "km.beansrn.com.       A 100.103.185.17"
        local-data: "ag.beansrn.com.       A 100.103.185.18"
        local-data: "vw.bytesrn.com.       A 100.103.185.19"
        local-data: "ha.bytesrn.com.       A 100.103.185.20"

        # Wildcard: *.rp5.beansrn.com -> Raspberry Pi
        local-zone: "rp5.beansrn.com." redirect
        local-data: "rp5.beansrn.com.      A 100.103.185.17"

        # NAS records
        local-data: "jf.beansrn.com.       A 100.109.45.62"
        local-data: "nc.beansrn.com.       A 100.109.45.62"

        # Wildcard: *.nas.beansrn.com -> NAS
        local-zone: "nas.beansrn.com." redirect
        local-data: "nas.beansrn.com.      A 100.109.45.62"

    # -------------------------------------------------------------------------
    # Map client subnets to views
    # -------------------------------------------------------------------------
    access-control-view: 192.168.1.0/24 lan
    access-control-view: 100.64.0.0/10  tailscale

# -------------------------------------------------------------------------
# Upstream recursive resolution (for everything outside beansrn.com)
# -------------------------------------------------------------------------
forward-zone:
    name: "."
    forward-addr: 1.1.1.1        # Cloudflare primary
    forward-addr: 1.0.0.1        # Cloudflare secondary
    # forward-addr: 9.9.9.9     # Quad9 (alternative)