api:
  insecure: false
  dashboard: true

providers:
  docker: {}
  file:
    filename: /etc/traefik/routes.yaml
    watch: true

entrypoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        domains:
          - main: "beansrn.com"
            sans:
              - "*.beansrn.com"
              - "*.rp5.beansrn.com"
              - "*.nas.beansrn.com"

certificatesResolvers:
  letsencrypt:
    acme:
      storage: /etc/traefik/acme.json
      dnsChallenge:
        provider: cloudflare
        delayBeforeCheck: "30"
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
  