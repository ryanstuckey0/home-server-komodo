server:
    # -------------------------------------------------------------------------
    # General settings
    # -------------------------------------------------------------------------
    verbosity: 1
    port: 53
    interface: 0.0.0.0

    # Only reachable from within Docker network
    access-control: 127.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow

    # -------------------------------------------------------------------------
    # Performance / hardening
    # -------------------------------------------------------------------------
    num-threads: 2
    so-reuseport: yes
    cache-min-ttl: 300
    cache-max-ttl: 86400
    hide-identity: yes
    hide-version: yes
    use-syslog: no
    logfile: ""

    # -------------------------------------------------------------------------
    # DNSSEC validation
    # -------------------------------------------------------------------------
    auto-trust-anchor-file: "/opt/unbound/etc/unbound/root.key"

    # No local-data, no forward-zone — pure recursive resolution