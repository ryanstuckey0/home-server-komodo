services:
  unbound-lan:
    image: mvance/unbound-rpi:latest
    container_name: unbound-lan
    restart: unless-stopped
    volumes:
      - ./unbound-lan.conf:/opt/unbound/etc/unbound/unbound.conf:ro
    networks:
      traefik_default:
      dns_internal:
        ipv4_address: 10.10.10.3
    healthcheck:
      test: ["CMD-SHELL", "drill @127.0.0.1 km.beansrn.com || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  unbound-ts:
    image: mvance/unbound-rpi:latest
    container_name: unbound-ts
    restart: unless-stopped
    volumes:
      - ./unbound-ts.conf:/opt/unbound/etc/unbound/unbound.conf:ro
    networks:
      traefik_default:
      dns_internal:
        ipv4_address: 10.10.10.4
    healthcheck:
      test: ["CMD-SHELL", "drill @127.0.0.1 km.beansrn.com || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  adguard-home:
    image: adguard/adguardhome:latest
    container_name: adguard-home
    restart: unless-stopped
    depends_on:
      - unbound-lan
      - unbound-ts
    volumes:
      - adguard_work:/opt/adguardhome/work
      - adguard_conf:/opt/adguardhome/conf

    ports:
      # DNS (TCP + UDP) - LAN and Tailscale
      - "53:53/tcp"
      - "53:53/udp"

      # AdGuard setup wizard (only needed on first run; can be removed after)
      - "3000:3000/tcp"
      - "81:80/tcp" # Only needed if Traefik is not routing

    networks:
      traefik_default:
      dns_internal:
        ipv4_address: 10.10.10.2

    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik_default"
      traefik.http.routers.adguard.rule: "Host(`ag.beansrn.com`)"
      traefik.http.routers.adguard.entrypoints: "websecure"
      traefik.http.services.adguard.loadbalancer.server.port: "80"

volumes:
  adguard_work:
  adguard_conf:

networks:
  traefik_default:
    external: true
  dns_internal:
    internal: true
    ipam:
      config:
        - subnet: 10.10.10.0/24
