server:
    # -------------------------------------------------------------------------
    # General settings
    # -------------------------------------------------------------------------
    verbosity: 1
    port: 53
    interface: 0.0.0.0

    # Allow queries from Docker network and localhost
    access-control: 172.16.0.0/12 allow
    access-control: 127.0.0.0/8 allow

    # -------------------------------------------------------------------------
    # Performance / hardening
    # -------------------------------------------------------------------------
    num-threads: 2
    so-reuseport: yes
    cache-min-ttl: 300
    cache-max-ttl: 86400
    hide-identity: yes
    hide-version: yes
    use-syslog: no
    logfile: ""

    # -------------------------------------------------------------------------
    # Local DNS records - LAN IPs
    # -------------------------------------------------------------------------

    # Raspberry Pi records
    local-data: "km.beansrn.com.       A 192.168.1.2"
    local-data: "ag.beansrn.com.       A 192.168.1.2"
    local-data: "vw.beansrn.com.       A 192.168.1.2"
    local-data: "ha.beansrn.com.       A 192.168.1.2"

    # Wildcard: *.rp5.beansrn.com -> Raspberry Pi
    local-zone: "rp5.beansrn.com." redirect
    local-data: "rp5.beansrn.com.      A 192.168.1.2"

    # NAS records
    local-data: "jf.beansrn.com.       A 192.168.1.3"
    local-data: "nc.beansrn.com.       A 192.168.1.3"

    # Wildcard: *.nas.beansrn.com -> NAS
    local-zone: "nas.beansrn.com." redirect
    local-data: "nas.beansrn.com.      A 192.168.1.3"

# -------------------------------------------------------------------------
# Forward everything else to AdGuard for blocking, then recursive resolution
# -------------------------------------------------------------------------
forward-zone:
    name: "."
    forward-addr: adguard-home@53
